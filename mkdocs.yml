site_name: Sylvis Custom Item Wiki

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.snippets:
      base_path: docs
  - attr_list
  - md_in_html

plugins:
  - search
  - macros

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
  features:
    - content.code.copy

nav:
  - Home: index.md
  - Testing:
    - Main Page: testing/testing_main.md
    - Testing Page: testing/testing.md
    - Styleguide: testing/styleguide.md
  - Tobacco: single_pages/tobacco.md
  - Dasher: single_pages/dasher.md
  - Consumables: single_pages/consumables.md
  - Ghast Tuner: single_pages/ghast_tuner.md
  - Skins:
    - Main Page: skins/skins_main.md
    - Bakers Hat: skins/bakers_hat.md
    - Beer: skins/beer.md
    - Cat Ears: skins/cat_ears.md
    - Diving Bell: skins/diving_bell.md
    - Old Beer: skins/old_beer.md
    - Crown: skins/crown.md
  - Jester Outfit:
    - Main Page: jester/jester_main.md
    - Hat: jester/hat.md
    - Helmet: jester/helmet.md
    - Chestplate: jester/chestplate.md
    - Leggings: jester/leggings.md
    - Boots: jester/boots.md

