properties:
  stack_size: 1
  fire_resistant: false
  copy_components: false
  lore:
    - §7§oFinally, better air travel!
    - §9Right-click while on ghast to apply.
    - §9Doubles airspeed.
components:
  'minecraft:use_cooldown':
    seconds: 3
