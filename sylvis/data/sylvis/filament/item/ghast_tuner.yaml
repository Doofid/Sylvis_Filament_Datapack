id: 'sylvis:ghast_tuner_v1'
vanilla_item: 'minecraft:coal'
group: 'sylvis:additions'
item_resource:
  parent: 'minecraft:item/generated'
  textures:
    default:
      layer0: sylvis:item/ghast_tuner_v1
translations:
  en_us: Ghast Tuner V1
  de_de: Ghast Tuner V1
item_tags: []
behaviour:
  item_interact_execute:
    consumes: true
    commands:
      - 'execute at @p unless entity @e[type=minecraft:happy_ghast,sort=nearest,limit=1,distance=..5] run give @p sylvis:ghast_tuner_v1'
      - 'execute at @p as @e[type=minecraft:happy_ghast,distance=..5,limit=1] run attribute @s minecraft:flying_speed base set 0.08'
    damages: false
properties:
  stack_size: 1
  fire_resistant: false
  copy_components: false
  lore:
    - §7§oFinally, better air travel!
    - §9Right-click while on ghast to apply.
    - §9Doubles airspeed.
components:
  'minecraft:use_cooldown':
    seconds: 3
