id: 'sylvis:ghast_tuner_v1'
vanilla_item: 'minecraft:coal'
group: 'sylvis:additions'
item_resource:
  parent: 'minecraft:item/generated'
  textures:
    default:
      layer0: sylvis:item/ghast_tuner_v1
translations:
  en_us: Ghast Tuner V1
  de_de: Ghast Tuner V1
item_tags: []
behaviour:
  item_interact_execute:
    consumes: true
    commands:
      - 'execute as @p if entity @s[nbt=!{FallFlying:1b}] run velocity @s ^ ^ ^1.5'
      - 'execute as @p if entity @s[nbt={FallFlying:1b}] run velocity @s ^ ^ ^1'
