id: 'sylvis:cigarette'
translations:
  en_us: Cigarette
  de_de: Zigarette
vanilla_item: 'minecraft:bone'
group: 'sylvis:additions'
item_tags: []
item_resource:
  models:
    default: sylvis:items/cigarette
behaviour:
  item_interact_execute:
    consumes: true
    commands: 
      - effect give @s minecraft:blindness 2 1 false
      - particle minecraft:campfire_cosy_smoke ^ ^1.5 ^ 0.2 0.2 0.2 0.0001 25 normal
      - damage @s 5 minecraft:bad_respawn_point by @s
      - effect give @s minecraft:poison 3 2 false
      - effect give @s minecraft:nausea 10 2 false
      - effect give @s minecraft:saturation 150 2 false
properties:
  stack_size: 16
  lore:
    - §7§oHave a nice break once in a while.
    - §9Right-click to use, equip in inventory.
  fire_resistant: true
  copy_components: false

  'minecraft:equippable':
    slot: head
    allowed_entities: 'minecraft:player'
    dispensable: false
    swappable: false
    damage_on_hurt: false
    equip_on_interact: true
    can_be_sheared: false

